{% extends "base.html" %}
{% block title %}登录 - 活动报名平台{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white rounded-xl shadow-md p-8">
        <h2 class="text-2xl font-bold text-gray-900 mb-6 text-center">登录</h2>

        <form method="post" action="/auth/login" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
                <input type="email" id="email" name="email" required
                       value="{{ email or '' }}"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                       placeholder="your@email.com">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                <input type="password" id="password" name="password" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                       placeholder="请输入密码">
            </div>

            <div class="flex items-center">
                <input type="checkbox" id="remember_me" name="remember_me" value="1"
                       {% if remember_me %}checked{% endif %}
                       class="h-4 w-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                <label for="remember_me" class="ml-2 text-sm text-gray-600">记住我（30天内自动登录）</label>
            </div>

            <button type="submit"
                    class="w-full bg-indigo-600 text-white py-2 px-4 rounded-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition-colors">
                登录
            </button>
        </form>

        <p class="mt-4 text-center text-sm text-gray-600">
            没有账号？<a href="/auth/register" class="text-indigo-600 hover:text-indigo-700 font-medium">去注册</a>
        </p>
    </div>
</div>
{% endblock %}
