{% extends "base.html" %}
{% block title %}注册 - 活动报名平台{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white rounded-xl shadow-md p-8">
        <h2 class="text-2xl font-bold text-gray-900 mb-6 text-center">注册</h2>

        <form method="post" action="/auth/register" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
                <input type="email" id="email" name="email" required
                       value="{{ email or '' }}"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                       placeholder="your@email.com">
            </div>

            <div>
                <label for="nickname" class="block text-sm font-medium text-gray-700 mb-1">昵称</label>
                <input type="text" id="nickname" name="nickname" required
                       value="{{ nickname or '' }}"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                       placeholder="您的显示名称">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                <input type="password" id="password" name="password" required minlength="6"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                       placeholder="至少6位密码">
            </div>

            <button type="submit"
                    class="w-full bg-indigo-600 text-white py-2 px-4 rounded-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition-colors">
                注册
            </button>
        </form>

        <p class="mt-4 text-center text-sm text-gray-600">
            已有账号？<a href="/auth/login" class="text-indigo-600 hover:text-indigo-700 font-medium">去登录</a>
        </p>
    </div>
</div>
{% endblock %}
