{% extends "base.html" %}
{% block title %}编辑 - {{ activity.title }}{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
  <h1 class="text-2xl font-bold text-gray-900 mb-6">编辑活动</h1>
  <form method="post" enctype="multipart/form-data" class="bg-white rounded-xl shadow-md p-6 space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">标题 *</label>
      <input type="text" name="title" required maxlength="100" value="{{ activity.title }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">分类 *</label>
      <select name="category" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
        {% for cat in categories %}<option value="{{ cat }}" {% if cat == activity.category %}selected{% endif %}>{{ cat }}</option>{% endfor %}
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">描述</label>
      <textarea name="description" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">{{ activity.description }}</textarea>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div><label class="block text-sm font-medium text-gray-700 mb-1">开始时间 *</label>
      <input type="datetime-local" name="start_time" required value="{{ activity.start_time.strftime('%Y-%m-%dT%H:%M') }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"></div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">结束时间 *</label>
      <input type="datetime-local" name="end_time" required value="{{ activity.end_time.strftime('%Y-%m-%dT%H:%M') }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"></div>
    </div>
    <div><label class="block text-sm font-medium text-gray-700 mb-1">地点 *</label>
    <input type="text" name="location" required value="{{ activity.location }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"></div>
    <div class="grid grid-cols-2 gap-4">
      <div><label class="block text-sm font-medium text-gray-700 mb-1">人数上限</label>
      <input type="number" name="max_participants" value="{{ activity.max_participants }}" min="0" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"></div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">费用 (元)</label>
      <input type="number" name="fee" value="{{ activity.fee }}" min="0" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"></div>
    </div>
    <div><label class="block text-sm font-medium text-gray-700 mb-1">标签</label>
    <input type="text" name="tags" value="{% for tag in activity.tags %}{{ tag.tag_name }}{% if not loop.last %}, {% endif %}{% endfor %}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"></div>
    <div><label class="block text-sm font-medium text-gray-700 mb-1">封面图片</label>
    <input type="file" name="cover_image" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:bg-indigo-50 file:text-indigo-700"></div>
    <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition-colors">保存修改</button>
  </form>
</div>
{% endblock %}
