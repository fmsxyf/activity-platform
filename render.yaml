services:
  - type: web
    name: activity-platform
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./activity.db
      - key: PYTHON_VERSION
        value: 3.11.15
